<div class="photo-box" id="pb-before-water">
            <input type="file" accept="image/*" onchange="loadPhoto(this,'before-water')">
            <div class="photo-icon">📷</div>
            <div class="photo-label">飲水/設備<br>更換前</div>
            <div class="overlay" style="color:#fff;font-size:.7rem;">更換照片</div>
          </div>
          <div class="photo-box" id="pb-after-water">
            <input type="file" accept="image/*" onchange="loadPhoto(this,'after-water')">
            <div class="photo-icon">✅</div>
            <div class="photo-label">飲水/設備<br>更換後</div>
            <div class="overlay" style="color:#fff;font-size:.7rem;">更換照片</div>
          </div>
        </div>
      </div>

      <div class="photo-section">
        <div style="font-size:.76rem;font-weight:700;color:var(--tl);margin-bottom:8px;">🐱 寵物萌照 / 互動影片</div>
        <div class="photo-row" id="petPhotoRow">
          <div class="photo-box">
            <input type="file" accept="image/*" onchange="addPetPhoto(this)">
            <div class="photo-icon">📸</div>
            <div class="photo-label">新增萌照</div>
          </div>
        </div>
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">📝 其他補充備註</div>
      <div class="field">
        <textarea id="rNote" rows="3" placeholder="例如：今日環境整潔狀況、鑰匙歸還位置、或特別想對飼主說的話..."></textarea>
      </div>
    </div>

    <button class="submit-btn" onclick="submitReport()">🐾 完成並送出回報 🐾</button>
    <button class="close-btn" onclick="closeMod()">取消返回</button>
  </div>
</div>

<script>
// --- 核心變數 ---
const sitters = {
  "Ying": { pw: "715715", av: "🦊" },
  "小汶": { pw: "715715", av: "🐰" },
  "菓菓": { pw: "715715", av: "🦔" },
  "小茹": { pw: "715715", av: "🐿️" },
  "阿瑛": { pw: "715715", av: "🐶" }
};

let curSitter = "";

// --- 登入邏輯 ---
function login() {
  const name = document.getElementById('sitterSel').value;
  const pw = document.getElementById('sitterPw').value;
  const err = document.getElementById('loginErr');

  if (name && sitters[name] && pw === sitters[name].pw) {
    curSitter = name;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainScreen').style.display = 'block';
    document.getElementById('topAv').innerText = sitters[name].av;
    document.getElementById('topNm').innerText = name;
    document.getElementById('topRole').innerText = "專業到府保母";
    err.style.display = 'none';
    // 這裡可以加入讀取案件的 function
  } else {
    err.style.display = 'block';
  }
}

function logout() {
  location.reload();
}

// --- 頁籤切換 ---
function sw(tabId, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('tab-cases').style.display = tabId === 'cases' ? 'block' : 'none';
  document.getElementById('tab-salary').style.display = tabId === 'salary' ? 'block' : 'none';
  document.getElementById('tab-history').style.display = tabId === 'history' ? 'block' : 'none';
}

// --- 彈窗控制 ---
function closeMod() {
  document.getElementById('reportMod').classList.remove('show');
}

// --- 照片處理 (範例) ---
function loadPhoto(input, type) {
  const box = input.parentElement;
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = function(e) {
      let img = box.querySelector('img');
      if (!img) {
        img = document.createElement('img');
        box.appendChild(img);
      }
      img.src = e.target.result;
      box.classList.add('has-img');
    };
    reader.readAsDataURL(input.files[0]);
  }
}

function addPetPhoto(input) {
  if (input.files && input.files[0]) {
    // 實作邏輯：新增一個預覽框並把目前選取的圖放進去
    loadPhoto(input, 'pet');
  }
}

// --- 送出回報 (範例) ---
function submitReport() {
  alert("回報已送出！(此為測試訊息，實際需串接資料庫)");
  closeMod();
}
</script>
</body>
</html>
