<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>貓窩裏🎉 專業褓姆工作管理系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--p1:#FF8FA3;--bg:#FFF5F8;--border:#FFD6E0;--t:#3D2B35;--tl:#8B687A;--tm:#6B4558;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--t);line-height:1.5;}

/* ── LOGIN ── */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#FFD0DF 0%,#FFF5F8 100%);}
.lbox{background:#fff;border:2.5px solid var(--border);border-radius:24px;padding:35px;width:340px;text-align:center;box-shadow:0 12px 30px rgba(255,143,163,0.2);}
.l-title{font-size:1.5rem;font-weight:900;color:var(--p1);margin-bottom:20px;}
select,input{width:100%;padding:12px;margin:8px 0;border:2px solid var(--border);border-radius:10px;font-size:1rem;outline:none;}
.btn-main{width:100%;padding:13px;background:var(--p1);color:white;border:none;border-radius:12px;font-weight:900;cursor:pointer;font-size:1rem;}

/* ── NAV & TABS ── */
#mainScreen{display:none;}
.nav{background:#fff;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100;}
.tabs{display:flex;background:#FFE8EF;padding:5px;margin:15px;border-radius:12px;gap:5px;}
.tab{flex:1;text-align:center;padding:10px;font-weight:bold;cursor:pointer;border-radius:10px;color:var(--tl);font-size:0.85rem;}
.tab.active{background:var(--p1);color:white;}

/* ── CASE CARDS ── */
.container{padding:0 15px 100px;}
.card{background:#fff;border:2px solid var(--border);border-radius:18px;padding:18px;margin-bottom:15px;box-shadow:0 4px 10px rgba(0,0,0,0.02);}
.badge{padding:3px 10px;border-radius:20px;font-size:0.7rem;font-weight:bold;background:#FFF0F4;color:var(--p1);}

/* ── ULTRA DETAILED FORM ── */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px);}
.m-box{background:#fff;width:100%;max-width:650px;border-radius:25px 25px 0 0;padding:20px;max-height:92vh;overflow-y:auto;}
.sec{margin-bottom:20px;padding:15px;background:var(--bg);border-radius:15px;border:1px solid var(--border);}
.sec-title{font-weight:900;color:var(--p1);margin-bottom:12px;display:block;font-size:1rem;border-bottom:2px solid var(--border);padding-bottom:5px;}

.q-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:0.9rem;cursor:pointer;}
.q-row input[type="checkbox"], .q-row input[type="radio"]{width:18px;height:18px;accent-color:var(--p1);}
.grid-q{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0;}
.photo-btn{border:2px dashed var(--border);border-radius:12px;height:120px;display:flex;align-items:center;justify-content:center;position:relative;background:#fff;overflow:hidden;font-size:0.75rem;color:var(--tl);text-align:center;}
.photo-btn img{width:100%;height:100%;object-fit:cover;position:absolute;z-index:2;}
.photo-btn input{opacity:0;position:absolute;inset:0;cursor:pointer;z-index:3;}

textarea, select.full{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px;margin-top:5px;font-family:inherit;}
table{width:100%;border-collapse:collapse;margin-top:10px;background:#fff;}
th,td{padding:12px;border-bottom:1px solid var(--border);text-align:left;font-size:0.85rem;}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="lbox">
    <div class="l-title">🐾 貓窩裏・專業工作站</div>
    <select id="sitterSel">
      <option value="">— 請選擇您的名字 —</option>
      <option value="Ying">🦊 Ying</option>
      <option value="小汶">🐰 小汶</option>
      <option value="菓菓">🦔 菓菓</option>
      <option value="小茹">🐿️ 小茹</option>
      <option value="阿瑛">🐶 阿瑛</option>
    </select>
    <input type="password" id="pwIn" placeholder="個人密碼 (715715)">
    <button class="btn-main" onclick="doLogin()">登入管理後台</button>
  </div>
</div>

<div id="mainScreen">
  <div class="nav">
    <b id="who" style="color:var(--p1);"></b>
    <button onclick="location.reload()" style="background:none; border:1.5px solid var(--border); padding:5px 12px; border-radius:8px; font-size:0.8rem;">登出</button>
  </div>
  <div class="tabs">
    <div class="tab active" id="tab1" onclick="switchTab(1)">📋 待辦案件</div>
    <div class="tab" id="tab2" onclick="switchTab(2)">📝 照護紀錄</div>
    <div class="tab" id="tab3" onclick="switchTab(3)">💰 薪資統計</div>
  </div>
  <div class="container" id="viewArea"></div>
</div>

<div class="modal" id="reportModal">
  <div class="m-box">
    <h3 style="color:var(--p1);margin-bottom:15px;text-align:center;">🐱 專業到府照護回報</h3>
    
    <div class="sec">
      <span class="sec-title">📍 抵達安全確認</span>
      <div class="grid-q">
        <label class="q-row"><input type="checkbox"> 雙手酒精消毒</label>
        <label class="q-row"><input type="checkbox"> 更換工作服/襪</label>
        <label class="q-row"><input type="checkbox"> 門窗防護鎖定</label>
        <label class="q-row"><input type="checkbox"> 確認毛孩迎門</label>
      </div>
      <div style="margin-top:10px; font-size:0.85rem;">室內溫度：<input type="number" style="width:50px;">°C / 濕度：<input type="number" style="width:50px;">%</div>
    </div>

    <div class="sec">
      <span class="sec-title">📸 環境清潔 (前後對比)</span>
      <div class="photo-grid">
        <div class="photo-btn"><span>📷 砂盆/環境<br>清潔前照片</span><input type="file" onchange="preview(this)"><img></div>
        <div class="photo-btn"><span>✅ 砂盆/環境<br>清潔後照片</span><input type="file" onchange="preview(this)"><img></div>
      </div>
      <div class="grid-q">
        <label class="q-row"><input type="checkbox"> 鏟除砂團/排泄物</label>
        <label class="q-row"><input type="checkbox"> 補充新砂/周邊落砂</label>
        <label class="q-row"><input type="checkbox"> 清理嘔吐物/異物</label>
        <label class="q-row"><input type="checkbox"> 垃圾打包帶走</label>
      </div>
    </div>

    <div class="sec">
      <span class="sec-title">🍱 飲食健康紀錄</span>
      <div style="margin-bottom:10px;">
        <span style="font-size:0.9rem;">乾糧/罐頭剩餘：</span>
        <select><option>全部吃完</option><option>剩餘 1/4</option><option>剩餘 1/2</option><option>幾乎沒吃</option></select>
      </div>
      <div class="grid-q">
        <label class="q-row"><input type="checkbox"> 清洗食碗/水杯</label>
        <label class="q-row"><input type="checkbox"> 更換新鮮飲水</label>
        <label class="q-row"><input type="checkbox"> 給予零食/保健品</label>
        <label class="q-row"><input type="checkbox"> 觀察喝水量正常</label>
      </div>
    </div>

    <div class="sec">
      <span class="sec-title">🩺 毛孩精神與排泄觀察</span>
      <div class="grid-q">
        <label class="q-row"><input type="radio" name="spirit"> 精神極佳</label>
        <label class="q-row"><input type="radio" name="spirit"> 正常休息</label>
        <label class="q-row"><input type="radio" name="shit"> 便便正常</label>
        <label class="q-row"><input type="radio" name="shit"> 軟便/拉稀</label>
      </div>
      <textarea id="noteIn" rows="4" placeholder="請詳細記錄：例如多貓家庭中每隻貓的表現、是否有流鼻涕/流眼淚、互動玩耍過程、餵藥是否順利等..."></textarea>
    </div>

    <button class="btn-main" onclick="submitFinal()">完成專業回報並存檔</button>
    <button onclick="closeModal()" style="width:100%; background:none; border:none; margin-top:10px; color:#999; font-size:0.9rem;">返回</button>
  </div>
</div>

<script>
// 確保 5 位保姆都有案件
const allCases = [
  { id: 1, sitter: 'Ying', client: '陳小姐', pets: '咪咪、花花(貓)', time: '09:00', addr: '苓雅區中正路...', fee: 450 },
  { id: 2, sitter: 'Ying', client: '王先生', pets: '大黃(狗)', time: '13:00', addr: '新興區...', fee: 550 },
  { id: 3, sitter: '小汶', client: '李太太', pets: '阿肥(貓)', time: '10:30', addr: '左營區...', fee: 450 },
  { id: 4, sitter: '菓菓', client: '張小姐', pets: '小黑(貓)', time: '11:00', addr: '三民區...', fee: 450 },
  { id: 5, sitter: '小茹', client: '許太太', pets: '球球(貓)', time: '16:00', addr: '鳳山區...', fee: 450 },
  { id: 6, sitter: '阿瑛', client: '趙先生', pets: 'Momo(貓)', time: '13:00', addr: '前鎮區...', fee: 450 }
];

let curSitter = "";
let historyRecords = [];

function doLogin() {
  const name = document.getElementById('sitterSel').value;
  const pw = document.getElementById('pwIn').value;
  if(name && pw === "715715") {
    curSitter = name;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainScreen').style.display = 'block';
    document.getElementById('who').innerText = "📍 登入中：" + name;
    switchTab(1);
  } else { alert("登入失敗！"); }
}

function switchTab(n) {
  const area = document.getElementById('viewArea');
  document.querySelectorAll('.tab').forEach((t, i) => t.className = (i+1===n) ? 'tab active' : 'tab');
  if(n === 1) renderCases(area);
  else if(n === 2) renderHistory(area);
  else if(n === 3) renderSalary(area);
}

function renderCases(area) {
  const mine = allCases.filter(c => c.sitter === curSitter);
  area.innerHTML = mine.length ? mine.map(c => `
    <div class="card">
      <div style="display:flex; justify-content:space-between;"><span class="badge">預約案件</span><span style="font-size:0.8rem; color:#999;">#${c.id}</span></div>
      <div style="font-size:1.15rem; font-weight:900; color:var(--p1); margin:10px 0;">${c.client}</div>
      <div style="font-size:0.85rem; color:var(--tm);">🐾 毛孩：${c.pets}<br>⏰ 時間：${c.time}<br>📍 地址：${c.addr}</div>
      <button class="btn-main" style="margin-top:12px; font-size:0.9rem;" onclick="openModal(${c.id})">開啟詳細回報單</button>
    </div>
  `).join('') : '<div style="text-align:center;padding:80px;color:#999;">今日暫無案件 🌿</div>';
}

function renderHistory(area) {
  area.innerHTML = historyRecords.length ? historyRecords.map(r => `
    <div class="card" style="opacity:0.8;">
      <div style="font-weight:900; color:var(--p1);">${r.client} - 回報完成</div>
      <div style="font-size:0.85rem; margin-top:5px; border-top:1px solid #eee; padding-top:5px;">📝 紀錄：${r.note || '未填寫'}<br>⌛ 完成時間：${r.doneTime}</div>
    </div>
  `).join('') : '<div style="text-align:center;padding:80px;color:#999;">尚無回報紀錄</div>';
}

function renderSalary(area) {
  const total = historyRecords.reduce((s, r) => s + r.fee, 0);
  area.innerHTML = `
    <div class="card">
      <h3 style="color:var(--p1);margin-bottom:12px;">💰 本期薪資明細</h3>
      <table>
        <thead><tr><th>客戶</th><th>項目</th><th>薪資</th></tr></thead>
        <tbody>
          ${historyRecords.map(r => `<tr><td>${r.client}</td><td>到府照護</td><td>$${r.fee}</td></tr>`).join('')}
          <tr style="font-weight:900; color:var(--p1);"><td>合計</td><td></td><td>$${total}</td></tr>
        </tbody>
      </table>
    </div>
  `;
}

let activeId = null;
function openModal(id) { activeId = id; document.getElementById('reportModal').style.display = 'flex'; }
function closeModal() { document.getElementById('reportModal').style.display = 'none'; }
function preview(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = e => { input.nextElementSibling.src = e.target.result; input.nextElementSibling.style.display = 'block'; };
    reader.readAsDataURL(input.files[0]);
  }
}

function submitFinal() {
  const idx = allCases.findIndex(c => c.id === activeId);
  const target = allCases[idx];
  historyRecords.unshift({ ...target, note: document.getElementById('noteIn').value, doneTime: new Date().toLocaleString() });
  allCases.splice(idx, 1);
  alert("✨ 回報成功！");
  document.getElementById('noteIn').value = "";
  closeModal();
  switchTab(2);
}
</script>
</body>
</html>
