<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貓窩裏🎉 保母系統</title>
    <style>
        :root { --p1: #FF8FA3; --bg: #FFF5F8; --border: #FFD6E0; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .lbox { background: white; border: 2px solid var(--border); border-radius: 20px; padding: 30px; width: 320px; margin: 100px auto; text-align:center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        select, input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--border); border-radius: 8px; }
        .btn { width: 100%; padding: 12px; background: var(--p1); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #mainScreen { display: none; padding: 15px; }
        .card { background: white; border: 1px solid var(--border); border-radius: 15px; padding: 15px; margin-bottom: 10px; }
        .m-ov { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
        .m-box { background: white; padding: 20px; border-radius: 20px; width: 90%; max-height: 80vh; overflow-y: auto; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="lbox">
        <h3>🐾 保母登入</h3>
        <select id="sSel">
            <option value="">選擇保母</option>
            <option value="Ying">Ying</option>
            <option value="小汶">小汶</option>
        </select>
        <input type="password" id="sPw" placeholder="輸入密碼 715715">
        <button class="btn" onclick="login()">登入</button>
    </div>
</div>

<div id="mainScreen">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3 id="uName" style="color:var(--p1)"></h3>
        <button onclick="location.reload()">登出</button>
    </div>
    <hr border="0" style="border-top:1px solid var(--border)">
    <div id="caseList"></div>
</div>

<div class="m-ov" id="mOv">
    <div class="m-box">
        <h4>填寫回報</h4>
        <textarea id="rNote" rows="4" style="width:100%" placeholder="備註內容..."></textarea>
        <button class="btn" onclick="submit()">完成送出</button>
        <button onclick="closeM()" style="width:100%; margin-top:10px; border:none; background:none;">取消</button>
    </div>
</div>

<script>
    const cases = [
        { name: '王小姐', pet: '貓咪 2 隻', sitter: 'Ying' },
        { name: '李先生', pet: '柴犬 1 隻', sitter: '小汶' }
    ];

    function login() {
        const name = document.getElementById('sSel').value;
        const pw = document.getElementById('sPw').value;
        if (name && pw === '715715') {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'block';
            document.getElementById('uName').innerText = '你好, ' + name;
            render(name);
        } else {
            alert('密碼錯誤！');
        }
    }

    function render(sName) {
        const list = document.getElementById('caseList');
        const mine = cases.filter(c => c.sitter === sName);
        list.innerHTML = mine.map(c => `
            <div class="card">
                <b>客戶：${c.name}</b><br>
                寵物：${c.pet}<br>
                <button class="btn" style="margin-top:10px; padding:5px;" onclick="openM()">回報照護</button>
            </div>
        `).join('');
    }

    function openM() { document.getElementById('mOv').style.display = 'flex'; }
    function closeM() { document.getElementById('mOv').style.display = 'none'; }
    function submit() { alert('回報已成功！'); closeM(); }
</script>

</body>
</html>
