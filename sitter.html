<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>貓窩裏🐾 褓姆後台</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root{--p1:#FF8FA3;--bg:#FFF5F8;--border:#FFD6E0;--t:#3D2B35;--tl:#8B687A;}
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--t);padding-bottom:100px;}
        .nav{background:#fff;padding:15px;display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid var(--border);position:sticky;top:0;z-index:100;}
        .tabs{display:flex;background:#FFE8EF;padding:5px;margin:15px;border-radius:20px;gap:5px;}
        .tab{flex:1;text-align:center;padding:12px;font-weight:bold;cursor:pointer;border-radius:15px;color:var(--tl);font-size:0.8rem;}
        .tab.active{background:var(--p1);color:white;}
        .container{padding:0 15px;}
        .card{background:#fff;border:2px solid var(--border);border-radius:22px;padding:20px;margin-bottom:15px;}
        .btn-main{width:100%;padding:14px;background:linear-gradient(135deg,var(--p1),#FF6B8A);color:white;border:none;border-radius:15px;font-weight:900;cursor:pointer;font-size:1.1rem;}
        
        /* 密碼修改小窗 */
        .settings-btn{font-size:0.7rem; color:var(--tl); text-decoration:underline; border:none; background:none; cursor:pointer;}
        .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(5px);}
        .m-box{background:#fff;width:100%;max-width:600px;border-radius:30px 30px 0 0;padding:25px;max-height:90vh;overflow-y:auto;}
        input, select { width:100%; padding:12px; border-radius:12px; border:1.5px solid var(--border); margin-top:5px;}
        .fee-table {width:100%; border-collapse: collapse; font-size:0.85rem;}
        .fee-table td {padding:10px 4px; border-bottom:1px solid #eee;}
    </style>
</head>
<body>

<div id="loginScreen" style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:#FFDDE1;">
    <div style="background:white; padding:40px; border-radius:35px; text-align:center; width:340px; box-shadow:0 10px 25px rgba(0,0,0,0.05);">
        <h2 style="color:var(--p1); font-weight:900; margin-bottom:20px;">貓窩裏🐾 系統登入</h2>
        <select id="sitterSel" style="margin-bottom:15px;">
            <option value="Ying">🦊 Ying</option><option value="小汶">🐰 小汶</option>
            <option value="菓菓">🦔 菓菓</option><option value="小茹">🐿️ 小茹</option><option value="阿瑛">🐶 阿瑛</option>
        </select>
        <input type="password" id="pwIn" placeholder="請輸入密碼">
        <button class="btn-main" style="margin-top:20px;" onclick="doLogin()">進入後台</button>
    </div>
</div>

<div id="mainScreen" style="display:none;">
    <div class="nav">
        <div>
            <b id="who" style="color:var(--p1);"></b><br>
            <button class="settings-btn" onclick="openPwdModal()">修改密碼</button>
        </div>
        <button onclick="location.reload()" style="background:none; border:none; color:#bbb;">登出</button>
    </div>
    <div class="tabs">
        <div class="tab active" onclick="switchTab(1, this)">📋 任務</div>
        <div class="tab" onclick="switchTab(2, this)">📝 紀錄</div>
        <div class="tab" onclick="switchTab(3, this)">🧧 薪資</div>
    </div>
    <div class="container" id="viewArea"></div>
</div>

<div class="modal" id="pwdModal">
    <div class="m-box">
        <h3 style="text-align:center; color:var(--p1);">🔒 修改您的登入密碼</h3>
        <p style="font-size:0.8rem; color:#999; margin-bottom:15px; text-align:center;">密碼更新後，管理員介面也會同步更新。</p>
        <input type="password" id="newPwd" placeholder="請輸入新密碼">
        <button class="btn-main" style="margin-top:15px;" onclick="updatePassword()">確認修改</button>
        <button onclick="closePwdModal()" style="width:100%; border:none; background:none; margin-top:15px; color:#999;">取消</button>
    </div>
</div>

<script>
const SB_URL = "https://cswejuvithewfyhmisfc.supabase.co"; 
const SB_KEY = "sb_publishable_SHEt60Pl_LoqDHp2PLLqIg_ASjK72vz"; 
const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

let curSitter = "";

// 登入邏輯：從資料庫撈取密碼比對
async function doLogin() {
    const name = document.getElementById('sitterSel').value;
    const pw = document.getElementById('pwIn').value;

    const { data, error } = await supabaseClient.from('sitters').select('password').eq('name', name).single();
    
    if (data && data.password === pw) {
        curSitter = name;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainScreen').style.display = 'block';
        document.getElementById('who').innerText = "📍 保母：" + curSitter;
        switchTab(1);
    } else {
        alert("密碼不正確，請重新輸入。");
    }
}

// 修改密碼邏輯
async function updatePassword() {
    const newPw = document.getElementById('newPwd').value;
    if(!newPw) return alert("請輸入新密碼");

    const { error } = await supabaseClient
        .from('sitters')
        .update({ password: newPw, updated_at: new Date() })
        .eq('name', curSitter);

    if(!error) {
        alert("密碼修改成功！管理端已同步更新。");
        closePwdModal();
    } else {
        alert("修改失敗：" + error.message);
    }
}

function openPwdModal() { document.getElementById('pwdModal').style.display = 'flex'; }
function closePwdModal() { document.getElementById('pwdModal').style.display = 'none'; }

// 其餘功能 (切換分頁、回報、薪資明細)
async function switchTab(n, el) {
    if(el){ document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); el.classList.add('active');}
    const area = document.getElementById('viewArea');
    area.innerHTML = "<p style='text-align:center; padding:30px;'>載入中...</p>";
    
    if(n===1) {
        area.innerHTML = `<div class="card"><h3>🏠 陳小姐 (咪咪)</h3><button class="btn-main" onclick="alert('回報功能同前版本')">開始回報</button></div>`;
    } else if(n===3) {
        // 薪資明細
        const { data } = await supabaseClient.from('reports').select('created_at, client_name, fee').eq('sitter_name', curSitter).order('created_at', {ascending: false});
        const total = data ? data.reduce((s, r) => s + (Number(r.fee)||0), 0) : 0;
        let rows = data.map(r => `<tr><td>${new Date(r.created_at).toLocaleDateString()}</td><td>${r.client_name}</td><td style="text-align:right;">$${r.fee}</td></tr>`).join('');
        area.innerHTML = `
            <div style="background:var(--p1); color:white; padding:20px; border-radius:20px; text-align:center; margin-bottom:15px;">
                <small>本期薪資總計</small><h1 style="font-size:2.5rem;">$${total}</h1>
            </div>
            <div class="card">
                <table class="fee-table"><thead><tr><td>日期</td><td>案件</td><td style="text-align:right;">金額</td></tr></thead>
                <tbody>${rows}</tbody></table>
            </div>`;
    }
}
</script>
</body>
</html>
